<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SNAKEY!</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FF6B35;
  --lime:   #5FC441;
  --yellow: #FFD23F;
  --pink:   #FF3E7F;
  --teal:   #19D4A0;
  --cream:  #FFFAED;
  --brown:  #3A2600;
}
body {
  background: var(--cream);
  font-family: 'Fredoka One', cursive;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle, #FFD23F66 6px, transparent 6px),
    radial-gradient(circle, #FF6B3544 5px, transparent 5px),
    radial-gradient(circle, #5FC44144 4px, transparent 4px),
    radial-gradient(circle, #FF3E7F44 5px, transparent 5px);
  background-size: 130px 130px, 90px 90px, 160px 160px, 75px 75px;
  background-position: 0 0, 45px 45px, 75px 25px, 20px 65px;
  pointer-events: none; z-index: 0;
}
#wrapper {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  filter: drop-shadow(0 10px 40px rgba(58,38,0,.2));
}
#hud {
  width: 540px; display: flex;
  justify-content: space-between; align-items: center;
  padding: 10px 18px;
  background: var(--orange);
  border: 3px solid var(--brown); border-bottom: none;
  border-radius: 20px 20px 0 0;
}
.hud-pill {
  background: #fff; border: 2.5px solid var(--brown);
  border-radius: 40px; padding: 4px 16px;
  display: flex; flex-direction: column; align-items: center; min-width: 80px;
}
.hud-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; color:var(--brown); letter-spacing:1.5px; text-transform:uppercase; }
.hud-value { font-size:22px; line-height:1.15; }
#score-val { color:var(--orange); }
#hi-val    { color:var(--pink); }
#level-val { color:var(--lime); }
#title-badge { font-size:26px; color:#fff; letter-spacing:2px; text-shadow:2px 3px 0 var(--brown); }
#pause-btn {
  background: var(--yellow); border: 2.5px solid var(--brown); border-radius:40px;
  color: var(--brown); font-family:'Fredoka One',cursive; font-size:13px;
  padding: 5px 14px; cursor:pointer; transition:transform .12s;
}
#pause-btn:hover { transform:scale(1.08) rotate(-2deg); }
#canvas-wrap {
  position:relative; width:540px; height:540px;
  border-left:3px solid var(--brown); border-right:3px solid var(--brown);
  overflow:hidden; background:#FDFFF9;
}
canvas { display:block; }
.overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(255,250,237,.93);
  z-index:20; gap:14px;
  transition:opacity .3s;
}
.overlay.hidden { opacity:0; pointer-events:none; }
.ov-title {
  font-size:52px; color:var(--brown);
  text-shadow:3px 4px 0 var(--orange); letter-spacing:2px; line-height:1;
}
.ov-sub {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:13px;
  color:var(--brown); opacity:.6; letter-spacing:2px; text-transform:uppercase;
}
.fruit-row { font-size:30px; letter-spacing:6px; }
.btn {
  background:var(--lime); border:3px solid var(--brown); border-radius:50px;
  color:#fff; font-family:'Fredoka One',cursive; font-size:18px;
  letter-spacing:2px; padding:12px 40px; cursor:pointer;
  text-shadow:1px 2px 0 rgba(0,0,0,.2);
  box-shadow:0 5px 0 var(--brown);
  transition:transform .1s, box-shadow .1s;
}
.btn:hover  { transform:translateY(-3px); box-shadow:0 8px 0 var(--brown); }
.btn:active { transform:translateY(2px);  box-shadow:0 3px 0 var(--brown); }
.btn-red  { background:var(--pink); }
.btn-blue { background:var(--teal); }
.score-banner {
  background:var(--yellow); border:3px solid var(--brown);
  border-radius:16px; padding:10px 36px; text-align:center;
}
.score-banner .big { font-size:52px; color:var(--brown); line-height:1; }
.score-banner .lbl { font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--brown); opacity:.6; }
#new-best {
  background:var(--pink); color:#fff; border:3px solid var(--brown);
  border-radius:50px; padding:6px 24px; font-size:15px; letter-spacing:1px;
}
#footer {
  width:540px; display:flex; justify-content:center; gap:24px;
  padding:10px 18px; background:var(--lime);
  border:3px solid var(--brown); border-top:none;
  border-radius:0 0 20px 20px;
}
.key-hint { font-family:'Nunito',sans-serif; font-weight:700; font-size:11px; color:#fff; letter-spacing:1px; text-transform:uppercase; }
.key-hint kbd { background:#fff; color:var(--brown); border-radius:4px; padding:1px 6px; font-family:'Fredoka One',cursive; font-size:11px; border:1.5px solid var(--brown); }
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div class="hud-pill">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score-val">0</span>
    </div>
    <div id="title-badge">SNAKEY!</div>
    <div class="hud-pill">
      <span class="hud-label">Best</span>
      <span class="hud-value" id="hi-val">0</span>
    </div>
    <div class="hud-pill">
      <span class="hud-label">Level</span>
      <span class="hud-value" id="level-val">1</span>
    </div>
    <button id="pause-btn">⏸ Pause</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="gc" width="540" height="540"></canvas>

    <div class="overlay" id="start-screen">
      <div class="fruit-row">🍊 🍓 🍋 🍇 🥝</div>
      <div class="ov-title">SNAKEY!</div>
      <div class="ov-sub">eat fruits · grow big · don't crash</div>
      <button class="btn" id="start-btn">▶ &nbsp;Play Game</button>
      <div class="ov-sub" style="font-size:10px">WASD · Arrow keys &nbsp;|&nbsp; P = Pause</div>
    </div>

    <div class="overlay hidden" id="over-screen">
      <div class="ov-title" style="color:var(--pink);text-shadow:3px 4px 0 var(--brown)">Uh oh!</div>
      <div class="score-banner">
        <div class="lbl">Your Score</div>
        <div class="big" id="final-score">0</div>
      </div>
      <div id="new-best" style="display:none">🎉 NEW HIGH SCORE!</div>
      <button class="btn btn-red" id="restart-btn">↺ &nbsp;Play Again</button>
    </div>

    <div class="overlay hidden" id="pause-screen">
      <div class="fruit-row">⏸</div>
      <div class="ov-title" style="color:var(--teal);text-shadow:3px 4px 0 var(--brown)">Paused</div>
      <div class="ov-sub">take a breath 🍃</div>
      <button class="btn btn-blue" id="resume-btn">▶ &nbsp;Resume</button>
    </div>
  </div>

  <div id="footer">
    <span class="key-hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or Arrows — Move</span>
    <span class="key-hint"><kbd>P</kbd> — Pause</span>
    <span class="key-hint"><kbd>R</kbd> — Restart</span>
  </div>
</div>

<script>
/* ── Config ───────────────────────────────────────── */
const COLS = 18, ROWS = 18, TILE = 540 / 18; // 30px
const BASE_SPEED = 160, MIN_SPEED = 60, SPEED_STEP = 8;

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

/* ── State ────────────────────────────────────────── */
let snake, dir, nextDir, food, foodType;
let score, hiScore, level, speed;
let gameLoop = null, state = 'start';
let foodBob = 0, particles = [];
let shakeAmt = 0;

/* ── Fruits ───────────────────────────────────────── */
const FRUITS = [
  { body:'#FF6B35', shine:'#FF9A6C' },  // orange
  { body:'#FF3E7F', shine:'#FF7AAD' },  // strawberry
  { body:'#FFD23F', shine:'#FFE48A' },  // lemon
  { body:'#8B5CF6', shine:'#B48EFA' },  // grape
  { body:'#19D4A0', shine:'#6EEFCE' },  // kiwi
];

/* ── Audio ────────────────────────────────────────── */
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq, type, dur, vol) {
  try {
    const o = ac().createOscillator(), g = ac().createGain();
    o.connect(g); g.connect(ac().destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac().currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, ac().currentTime + dur);
    o.start(); o.stop(ac().currentTime + dur + .01);
  } catch(e) {}
}
function playEat() { beep(600,'triangle',.12,.18); setTimeout(()=>beep(900,'triangle',.08,.12),60); }
function playDie() { [300,220,150].forEach((f,i)=>setTimeout(()=>beep(f,'square',.18,.12),i*110)); }

/* ── Init ─────────────────────────────────────────── */
function initGame() {
  snake   = [{x:9,y:9},{x:8,y:9},{x:7,y:9},{x:6,y:9}];
  dir     = {x:1,y:0}; nextDir = {x:1,y:0};
  score   = 0; level = 1; speed = BASE_SPEED;
  particles = []; foodBob = 0; shakeAmt = 0;
  hiScore = parseInt(localStorage.getItem('snakeyHi')||'0');
  spawnFood(); updateHUD();
}

function spawnFood() {
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p; foodType = Math.floor(Math.random()*FRUITS.length); foodBob = 0;
}

/* ── Tick ─────────────────────────────────────────── */
function tick() {
  dir = {...nextDir};
  const h = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)) { endGame(); return; }
  snake.unshift(h);
  if (h.x===food.x&&h.y===food.y) {
    score++;
    playEat();
    spawnParticles(food.x, food.y, FRUITS[foodType].body);
    speed = Math.max(MIN_SPEED, BASE_SPEED - score*SPEED_STEP);
    level = Math.floor((BASE_SPEED-speed)/SPEED_STEP/3)+1;
    spawnFood();
    clearInterval(gameLoop); gameLoop = setInterval(tick, speed);
  } else {
    snake.pop();
  }
  updateHUD();
}

function endGame() {
  state = 'over'; clearInterval(gameLoop); gameLoop = null;
  playDie(); shakeAmt = 10;
  const isNew = score > hiScore;
  if (isNew) { hiScore = score; localStorage.setItem('snakeyHi', hiScore); }
  updateHUD();
  document.getElementById('final-score').textContent = score;
  document.getElementById('new-best').style.display = isNew ? 'block' : 'none';
  setTimeout(() => document.getElementById('over-screen').classList.remove('hidden'), 500);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('hi-val').textContent    = hiScore;
  document.getElementById('level-val').textContent = level;
}

/* ── Particles ────────────────────────────────────── */
function spawnParticles(gx, gy, color) {
  const cx=gx*TILE+TILE/2, cy=gy*TILE+TILE/2;
  for (let i=0;i<16;i++) {
    const a=(Math.PI*2/16)*i+Math.random()*.4, spd=2+Math.random()*3.5;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,size:4+Math.random()*5,color});
  }
}

/* ── roundRect util ───────────────────────────────── */
function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ── DRAW ─────────────────────────────────────────── */
function draw() {
  requestAnimationFrame(draw);
  foodBob += .07;
  if (shakeAmt > .3) shakeAmt *= .7; else shakeAmt = 0;

  ctx.save();
  if (shakeAmt) ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);

  /* Background */
  ctx.fillStyle = '#FDFFF9';
  ctx.fillRect(0,0,540,540);

  /* Dot grid */
  ctx.fillStyle = 'rgba(95,196,65,.13)';
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++) {
    ctx.beginPath(); ctx.arc(c*TILE+TILE/2, r*TILE+TILE/2, 2, 0, Math.PI*2); ctx.fill();
  }

  if (state !== 'start') {
    drawFood();
    drawSnake();
    drawParticles();
  }

  ctx.restore();
}

/* ── Snake ────────────────────────────────────────── */
function drawSnake() {
  /* draw tail → head so head is on top */
  for (let i=snake.length-1; i>=0; i--) {
    const {x,y} = snake[i];
    const pad = 2, sz = TILE-pad*2, px = x*TILE+pad, py = y*TILE+pad;

    ctx.save();
    ctx.strokeStyle = '#2D6B1A';
    ctx.lineWidth   = 2.5;

    if (i===0) {
      /* HEAD */
      ctx.fillStyle = '#5FC441';
      rr(px,py,sz,sz,8); ctx.fill(); ctx.stroke();

      /* inner lighter patch */
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      rr(px+5,py+5,sz-10,sz-10,5); ctx.fill();

      /* eyes */
      drawEyes(px,py,sz);

    } else {
      /* BODY – alternate two greens for "scale" look */
      ctx.fillStyle = (i%2===0) ? '#5FC441' : '#49AD2D';
      rr(px,py,sz,sz,7); ctx.fill(); ctx.stroke();

      /* highlight stripe */
      ctx.strokeStyle = 'rgba(255,255,255,.30)';
      ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(px+6,py+6); ctx.lineTo(px+sz-6,py+sz-6);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawEyes(px,py,sz) {
  /* position eyes pointing toward direction */
  let positions;
  if      (dir.x===1)  positions=[{x:px+sz-8,y:py+8}, {x:px+sz-8,y:py+sz-8}];
  else if (dir.x===-1) positions=[{x:px+8,   y:py+8}, {x:px+8,   y:py+sz-8}];
  else if (dir.y===1)  positions=[{x:px+8,   y:py+sz-8},{x:px+sz-8,y:py+sz-8}];
  else                 positions=[{x:px+8,   y:py+8}, {x:px+sz-8,y:py+8}];

  positions.forEach(e => {
    /* white of eye */
    ctx.fillStyle='#fff'; ctx.strokeStyle='#2D6B1A'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(e.x,e.y,4.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    /* pupil */
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.arc(e.x+dir.x*1.2,e.y+dir.y*1.2,2.2,0,Math.PI*2); ctx.fill();
    /* shine */
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(e.x+dir.x*1.2+1,e.y+dir.y*1.2-1,.9,0,Math.PI*2); ctx.fill();
  });
}

/* ── Food ─────────────────────────────────────────── */
function drawFood() {
  if (!food) return;
  const fr = FRUITS[foodType];
  const cx = food.x*TILE+TILE/2;
  const cy = food.y*TILE+TILE/2;
  const bob   = Math.sin(foodBob)*3;
  const pulse = 1+Math.sin(foodBob*1.3)*.09;
  const R     = TILE/2-5;

  ctx.save();
  ctx.translate(cx, cy+bob);
  ctx.scale(pulse,pulse);

  /* shadow */
  ctx.fillStyle='rgba(58,38,0,.12)';
  ctx.beginPath(); ctx.ellipse(0,R+2,8,3,0,0,Math.PI*2); ctx.fill();

  /* body */
  ctx.fillStyle=fr.body; ctx.strokeStyle='#3A2600'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill(); ctx.stroke();

  /* highlight */
  ctx.fillStyle=fr.shine;
  ctx.beginPath(); ctx.arc(-R*.28,-R*.28,R*.38,0,Math.PI*2); ctx.fill();

  /* stem */
  ctx.strokeStyle='#2D6B1A'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-R); ctx.lineTo(2,-R-5); ctx.stroke();

  /* leaf */
  ctx.fillStyle='#5FC441'; ctx.strokeStyle='#2D6B1A'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(6,-R-2,5,2.5,.5,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.restore();
}

/* ── Particles ────────────────────────────────────── */
function drawParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=.88; p.vy*=.88; p.life-=.05;
    if (p.life<=0) { particles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.strokeStyle='#3A2600'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

/* ── Input ────────────────────────────────────────── */
const DIRS = {
  ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
  ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
  ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
};
document.addEventListener('keydown', e => {
  const k=e.key;
  if (k==='p'||k==='P') { state==='playing'?pauseGame():state==='paused'&&resumeGame(); return; }
  if ((k==='r'||k==='R')&&state==='over') { startGame(); return; }
  if (state!=='playing') return;
  const d=DIRS[k]; if (!d) return;
  e.preventDefault();
  if (d.x!==0&&d.x===-dir.x) return;
  if (d.y!==0&&d.y===-dir.y) return;
  nextDir=d;
});

/* ── Screen mgmt ──────────────────────────────────── */
const IDS=['start-screen','over-screen','pause-screen'];
function hideAll() { IDS.forEach(id=>document.getElementById(id).classList.add('hidden')); }
function startGame()  { initGame(); state='playing'; hideAll(); clearInterval(gameLoop); gameLoop=setInterval(tick,speed); }
function pauseGame()  { state='paused'; clearInterval(gameLoop); gameLoop=null; hideAll(); document.getElementById('pause-screen').classList.remove('hidden'); }
function resumeGame() { state='playing'; hideAll(); gameLoop=setInterval(tick,speed); }

document.getElementById('start-btn').onclick   = startGame;
document.getElementById('restart-btn').onclick = startGame;
document.getElementById('resume-btn').onclick  = resumeGame;
document.getElementById('pause-btn').onclick   = ()=>{ state==='playing'?pauseGame():state==='paused'&&resumeGame(); };

/* ── Boot ─────────────────────────────────────────── */
score=0; level=1;
hiScore=parseInt(localStorage.getItem('snakeyHi')||'0');
document.getElementById('hi-val').textContent = hiScore;
requestAnimationFrame(draw);
</script>
</body>
</html>
